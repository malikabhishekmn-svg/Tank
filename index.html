<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tank War Pro - Fixed Controls</title>
    <style>
        :root { --p1-color: #2ecc71; --p2-color: #e67e22; }
        body { margin: 0; background: #111; color: #fff; font-family: sans-serif; overflow: hidden; touch-action: none; }
        
        #stage { position: relative; width: 100vw; height: 60vh; background: #222; border-bottom: 3px solid #444; overflow: hidden; }
        
        /* Tank Styles */
        .tank { position: absolute; width: 40px; height: 40px; transition: transform 0.1s linear; }
        .tank-body { width: 100%; height: 100%; border-radius: 5px; border: 2px solid #000; }
        .barrel { width: 6px; height: 20px; background: #000; position: absolute; left: 17px; top: -15px; border-radius: 2px; }
        
        #p1 .tank-body { background: var(--p1-color); }
        #p2 .tank-body { background: var(--p2-color); }
        #p2 .barrel { top: 35px; }

        /* UI */
        #ui { display: flex; justify-content: space-around; padding: 10px; background: #222; font-weight: bold; }
        .hp-bar { width: 100px; height: 8px; background: #444; margin-top: 5px; }
        .hp-fill { height: 100%; transition: width 0.3s; }

        /* New Controls Layout - Both at Bottom */
        #all-controls { display: grid; grid-template-columns: 1fr 1fr; height: 35vh; background: #1a1a1a; padding: 10px; gap: 10px; }
        .ctrl-panel { background: #252525; border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid #333; }
        .grid-ctrl { display: grid; grid-template-columns: 50px 50px 50px; grid-template-rows: 50px 50px; gap: 5px; }
        .btn { background: #444; border: none; color: white; border-radius: 8px; font-weight: bold; font-size: 18px; }
        .btn:active { background: #666; transform: scale(0.9); }
        .fire-btn { grid-column: 2; background: #c0392b !important; }
        
        .bullet { position: absolute; width: 6px; height: 6px; background: yellow; border-radius: 50%; box-shadow: 0 0 10px orange; }
    </style>
</head>
<body>

    <div id="ui">
        <div>P1: <div class="hp-bar"><div id="hp1" class="hp-fill" style="width:100%; background:var(--p1-color)"></div></div></div>
        <div>P2: <div class="hp-bar"><div id="hp2" class="hp-fill" style="width:100%; background:var(--p2-color)"></div></div></div>
    </div>

    <div id="stage">
        <div id="p1" class="tank" style="left: 20%; bottom: 20px;"><div class="barrel"></div><div class="tank-body"></div></div>
        <div id="p2" class="tank" style="left: 70%; top: 20px;"><div class="barrel"></div><div class="tank-body"></div></div>
    </div>

    <div id="all-controls">
        <div class="ctrl-panel">
            <span style="color:var(--p1-color); font-size:12px; margin-bottom:5px;">PLAYER 1 (GREEN)</span>
            <div class="grid-ctrl">
                <button class="btn" onpointerdown="move('p1','L')">◀</button>
                <button class="btn" onpointerdown="move('p1','U')">▲</button>
                <button class="btn" onpointerdown="move('p1','R')">▶</button>
                <div></div><button class="btn fire-btn" onpointerdown="shoot(1)">🔥</button><div></div>
                <button style="grid-column: 2; grid-row: 2;" class="btn" onpointerdown="move('p1','D')">▼</button>
            </div>
        </div>

        <div class="ctrl-panel">
            <span style="color:var(--p2-color); font-size:12px; margin-bottom:5px;">PLAYER 2 (ORANGE)</span>
            <div class="grid-ctrl">
                <button class="btn" onpointerdown="move('p2','L')">◀</button>
                <button class="btn" onpointerdown="move('p2','U')">▲</button>
                <button class="btn" onpointerdown="move('p2','R')">▶</button>
                <div></div><button class="btn fire-btn" onpointerdown="shoot(2)">🔥</button><div></div>
                <button style="grid-column: 2; grid-row: 2;" class="btn" onpointerdown="move('p2','D')">▼</button>
            </div>
        </div>
    </div>

    <script>
        let p1X = 50, p1Y = window.innerHeight*0.4, p2X = 250, p2Y = 50;
        let hp1 = 100, hp2 = 100;
        let bullets = [];

        function move(p, dir) {
            const step = 20;
            if(p === 'p1') {
                if(dir === 'L') p1X -= step; if(dir === 'R') p1X += step;
                if(dir === 'U') p1Y -= step; if(dir === 'D') p1Y += step;
                let el = document.getElementById('p1');
                el.style.left = p1X + 'px'; el.style.top = p1Y + 'px';
            } else {
                if(dir === 'L') p2X -= step; if(dir === 'R') p2X += step;
                if(dir === 'U') p2Y -= step; if(dir === 'D') p2Y += step;
                let el = document.getElementById('p2');
                el.style.left = p2X + 'px'; el.style.top = p2Y + 'px';
            }
        }

        function shoot(p) {
            const b = document.createElement('div');
            b.className = 'bullet';
            let bx = (p === 1 ? p1X + 17 : p2X + 17);
            let by = (p === 1 ? p1Y - 10 : p2Y + 40);
            let bv = (p === 1 ? -10 : 10);
            b.style.left = bx + 'px'; b.style.top = by + 'px';
            document.getElementById('stage').appendChild(b);
            bullets.push({el: b, x: bx, y: by, v: bv, owner: p});
        }

        function gameLoop() {
            bullets.forEach((b, i) => {
                b.y += b.v;
                b.el.style.top = b.y + 'px';
                
                // Hit detection
                if(b.owner === 1 && b.y < p2Y + 40 && b.y > p2Y && b.x > p2X && b.x < p2X + 40) {
                    hp2 -= 10; document.getElementById('hp2').style.width = hp2 + '%';
                    b.el.remove(); bullets.splice(i, 1);
                }
                if(b.owner === 2 && b.y > p1Y && b.y < p1Y + 40 && b.x > p1X && b.x < p1X + 40) {
                    hp1 -= 10; document.getElementById('hp1').style.width = hp1 + '%';
                    b.el.remove(); bullets.splice(i, 1);
                }
                if(b.y < 0 || b.y > 600) { b.el.remove(); bullets.splice(i, 1); }
            });
            if(hp1 <= 0 || hp2 <= 0) { alert("Game Over!"); location.reload(); }
            requestAnimationFrame(gameLoop);
        }
        gameLoop();
    </script>
</body>
</html>
