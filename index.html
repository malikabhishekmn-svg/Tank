<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Fixed Mystery Spin</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root {
            --neon-blue: #00f2fe;
            --neon-pink: #ff0055;
            --bg-dark: #050510;
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle, #1a1a3a 0%, #050510 100%);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: white;
            overflow: hidden;
        }

        .container { text-align: center; }

        .wheel-container {
            position: relative;
            width: 480px;
            height: 480px;
            margin: 0 auto 30px;
            border: 10px solid rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8), 0 0 20px var(--neon-blue);
        }

        .pointer {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            width: 45px;
            height: 55px;
            background: var(--neon-pink);
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 100;
            filter: drop-shadow(0 0 15px var(--neon-pink));
        }

        canvas {
            border-radius: 50%;
            transition: transform 6s cubic-bezier(0.1, 0, 0.1, 1);
            display: block;
        }

        #spinBtn {
            background: linear-gradient(45deg, var(--neon-blue), #4facfe);
            border: none;
            padding: 18px 60px;
            font-size: 1.4rem;
            font-weight: 900;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 25px rgba(0, 242, 254, 0.4);
            transition: 0.3s;
            text-transform: uppercase;
        }

        #spinBtn:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 0 40px var(--neon-blue);
        }

        #spinBtn:disabled { background: #333; cursor: not-allowed; opacity: 0.6; }

        .hint { margin-top: 15px; color: rgba(255,255,255,0.5); font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="container">
        <h1 style="letter-spacing: 5px; text-shadow: 0 0 10px var(--neon-blue); margin-top: 0;">LUCKY WHEEL</h1>
        <div class="wheel-container">
            <div class="pointer"></div>
            <canvas id="wheel" width="480" height="480"></canvas>
        </div>
        <button id="spinBtn">SPIN NOW</button>
        <p class="hint">Press <b>SPACE</b> to Spin!</p>
    </div>

    <!-- Sounds -->
    <audio id="spinSound" src="https://www.soundjay.com/misc/sounds/spinning-wheel-1.mp3"></audio>
    <audio id="winSound" src="https://www.myinstants.com/media/sounds/tada.mp3"></audio>

    <script>
        const canvas = document.getElementById("wheel");
        const ctx = canvas.getContext("2d");
        const spinBtn = document.getElementById("spinBtn");
        const spinSound = document.getElementById("spinSound");
        const winSound = document.getElementById("winSound");

        // --- Items Configuration ---
        // Best Prize එක Index 3 (එක එන්නේ නැහැ)
        const items = [
            { label: "Chance 1", imgUrl: "https://cdn-icons-png.flaticon.com/128/1046/1046714.png", color: "#34495e", type: "chance" },
            { label: "Pro Prize 1", imgUrl: "https://cdn-icons-png.flaticon.com/128/2933/2933116.png", color: "#00f2fe", type: "rare" },
            { label: "No Luck", imgUrl: "https://cdn-icons-png.flaticon.com/128/1828/1828843.png", color: "#e74c3c", type: "bad" },
            { label: "BEST PRIZE", imgUrl: "https://cdn-icons-png.flaticon.com/128/614/614131.png", color: "#FFD700", type: "impossible" },
            { label: "Chance 2", imgUrl: "https://cdn-icons-png.flaticon.com/128/1046/1046714.png", color: "#2c3e50", type: "chance" },
            { label: "Pro Prize 2", imgUrl: "https://cdn-icons-png.flaticon.com/128/9024/9024621.png", color: "#4facfe", type: "rare" },
            { label: "No Chance", imgUrl: "https://cdn-icons-png.flaticon.com/128/1828/1828843.png", color: "#c0392b", type: "bad" }
        ];

        const size = items.length;
        const arc = (2 * Math.PI) / size;
        let currentRotation = 0;
        let canSpin = true;

        // Image Loading Logic
        let imagesLoaded = 0;
        const imgs = [];
        items.forEach((item, i) => {
            const img = new Image();
            img.src = item.imgUrl;
            img.onload = () => {
                imagesLoaded++;
                if (imagesLoaded === size) drawWheel();
            };
            imgs[i] = img;
        });

        // අඳින විදිය (Images නැතත් text එක හරි පේන්න හැදුවා)
        function drawWheel() {
            ctx.clearRect(0, 0, 480, 480);
            for (let i = 0; i < size; i++) {
                const angle = i * arc;
                
                ctx.beginPath();
                ctx.fillStyle = items[i].color;
                ctx.moveTo(240, 240);
                ctx.arc(240, 240, 235, angle, angle + arc);
                ctx.lineTo(240, 240);
                ctx.fill();
                ctx.strokeStyle = "rgba(255,255,255,0.2)";
                ctx.stroke();

                ctx.save();
                ctx.translate(240, 240);
                ctx.rotate(angle + arc / 2);
                
                // Draw Image if loaded
                if (imagesLoaded === size) {
                    ctx.drawImage(imgs[i], 140, -20, 45, 45);
                }

                ctx.fillStyle = "white";
                ctx.font = "bold 15px Arial";
                ctx.fillText(items[i].label, 65, 10);
                ctx.restore();
            }
        }

        const startSpin = () => {
            if (!canSpin) return;
            canSpin = false;
            spinBtn.disabled = true;
            spinSound.currentTime = 0;
            spinSound.play();

            // --- RIGGED CALCULATION ---
            let stopIndex;
            const rand = Math.random() * 100;

            if (rand < 2) { 
                // 2% Chance for Pro Prizes (1 or 5)
                stopIndex = Math.random() > 0.5 ? 1 : 5;
            } else {
                // Other indices: 0, 2, 4, 6 (Except 3 - Best Prize)
                const options = [0, 2, 4, 6];
                stopIndex = options[Math.floor(Math.random() * options.length)];
            }

            // Calculation to align with pointer at top
            const extraDegree = (size - stopIndex) * arc - (arc / 2);
            // 12 full rotations + target
            const rotationValue = (Math.PI * 2 * 12) + extraDegree; 
            
            currentRotation += rotationValue;
            canvas.style.transform = `rotate(${currentRotation}rad)`;

            setTimeout(() => {
                canSpin = true;
                spinBtn.disabled = false;
                winSound.play();

                const won = items[stopIndex];
                
                // Results Popup
                Swal.fire({
                    title: `<span style="color:${won.color}">${won.label}</span>`,
                    html: `
                        <div class="animate__animated animate__zoomIn">
                            <img src="${won.imgUrl}" width="80" style="margin-bottom:15px">
                            <p style="font-size:1.1rem">${getResultMsg(won.type)}</p>
                        </div>
                    `,
                    background: '#0a0a1a',
                    color: '#fff',
                    showClass: { popup: 'animate__animated animate__jackInTheBox' },
                    hideClass: { popup: 'animate__animated animate__zoomOut' },
                    confirmButtonText: 'Try Again',
                    confirmButtonColor: '#00f2fe'
                });
            }, 6500);
        };

        function getResultMsg(type) {
            if (type === 'rare') return "OMG! You're super lucky machan! 🎉";
            if (type === 'bad') return "Aiyo.. No luck today. Try again! 😅";
            return "Not bad! You got another chance. 🔥";
        }

        // Space bar
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                startSpin();
            }
        });

        spinBtn.addEventListener("click", startSpin);

        // Fallback: Images load වෙන්න පරක්කු වුණොත් wheel එක ඇඳලා පෙන්නන්න
        setTimeout(() => {
            if (imagesLoaded < size) drawWheel();
        }, 1000);

    </script>
</body>
</html>
