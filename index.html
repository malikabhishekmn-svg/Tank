<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixed No-Image Rigged Wheel</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root {
            --neon-blue: #00f2fe;
            --neon-pink: #ff0055;
            --bg-dark: #050510;
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle, #1a1a3a 0%, #050510 100%);
            font-family: 'Segoe UI', Arial, sans-serif;
            color: white;
            overflow: hidden;
        }

        .container { text-align: center; }

        .wheel-container {
            position: relative;
            width: 480px;
            height: 480px;
            margin: 0 auto 30px;
            border: 12px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.9), 0 0 20px var(--neon-blue);
        }

        .pointer {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            width: 45px;
            height: 60px;
            background: var(--neon-pink);
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 100;
            filter: drop-shadow(0 0 15px var(--neon-pink));
        }

        canvas {
            display: block;
            border-radius: 50%;
            transition: transform 7s cubic-bezier(0.15, 0, 0.1, 1);
        }

        #spinBtn {
            background: linear-gradient(45deg, var(--neon-blue), #4facfe);
            border: none;
            padding: 18px 60px;
            font-size: 1.5rem;
            font-weight: 900;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 25px rgba(0, 242, 254, 0.5);
            transition: 0.3s;
            text-transform: uppercase;
        }

        #spinBtn:disabled { opacity: 0.5; cursor: not-allowed; }
        .hint { margin-top: 15px; color: rgba(255,255,255,0.4); font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="container">
        <h1 style="letter-spacing: 5px; text-shadow: 0 0 10px var(--neon-blue);">LUCKY SPIN</h1>
        <div class="wheel-container">
            <div class="pointer"></div>
            <canvas id="wheel" width="480" height="480"></canvas>
        </div>
        <button id="spinBtn">SPIN NOW</button>
        <p class="hint">Press <b>SPACE</b> to Spin!</p>
    </div>

    <audio id="spinSound" src="https://www.soundjay.com/misc/sounds/spinning-wheel-1.mp3"></audio>
    <audio id="winSound" src="https://www.myinstants.com/media/sounds/tada.mp3"></audio>

    <script>
        const canvas = document.getElementById("wheel");
        const ctx = canvas.getContext("2d");
        const spinBtn = document.getElementById("spinBtn");
        const spinSound = document.getElementById("spinSound");
        const winSound = document.getElementById("winSound");

        // --- Items Configuration ---
        const items = [
            { label: "OOPPS!", color: "#e74c3c", type: "bad" },
            { label: "PRO PRIZE 1", color: "#00f2fe", type: "rare" },
            { label: "TRY AGAIN", color: "#34495e", type: "bad" },
            { label: "BEST PRIZE", color: "#FFD700", type: "impossible" },
            { label: "NO LUCK!", color: "#c0392b", type: "bad" },
            { label: "PRO PRIZE 2", color: "#4facfe", type: "rare" },
            { label: "CHANCE!", color: "#2c3e50", type: "chance" }
        ];

        const size = items.length;
        const arc = (2 * Math.PI) / size;
        let currentRotation = 0;
        let canSpin = true;

        function drawWheel() {
            ctx.clearRect(0, 0, 480, 480);
            items.forEach((item, i) => {
                const angle = i * arc;
                
                // Segment background
                ctx.beginPath();
                ctx.fillStyle = item.color;
                ctx.moveTo(240, 240);
                ctx.arc(240, 240, 235, angle, angle + arc);
                ctx.lineTo(240, 240);
                ctx.fill();
                
                // Border lines
                ctx.strokeStyle = "rgba(255,255,255,0.3)";
                ctx.lineWidth = 2;
                ctx.stroke();

                // Text
                ctx.save();
                ctx.translate(240, 240);
                ctx.rotate(angle + arc / 2);
                ctx.fillStyle = "white";
                ctx.font = "bold 18px Arial";
                ctx.shadowBlur = 4;
                ctx.shadowColor = "black";
                ctx.textAlign = "right";
                // මෙතන පෙළ මැදට කරනවා
                ctx.fillText(item.label, 210, 10);
                ctx.restore();
            });

            // මැද රවුම (Center Pin)
            ctx.beginPath();
            ctx.fillStyle = "white";
            ctx.arc(240, 240, 15, 0, 2 * Math.PI);
            ctx.fill();
        }

        const startSpin = () => {
            if (!canSpin) return;
            canSpin = false;
            spinBtn.disabled = true;
            spinSound.currentTime = 0;
            spinSound.play();

            // --- RIGGED LOGIC ---
            let stopIndex;
            const luck = Math.random() * 100;

            if (luck < 1) { // 1% chance for Pro Prize
                stopIndex = Math.random() > 0.5 ? 1 : 5;
            } else { 
                // 99% Chance for others (Excluding BEST PRIZE at Index 3)
                const options = [0, 2, 4, 6];
                stopIndex = options[Math.floor(Math.random() * options.length)];
            }

            // Calculation to fix the 3 o'clock start issue
            const rotationToTop = (3 * Math.PI) / 2; 
            const segmentCenter = (stopIndex * arc) + (arc / 2);
            const finalAngle = rotationToTop - segmentCenter;
            
            const totalSpins = (Math.PI * 2 * 12); 
            currentRotation += totalSpins + finalAngle - (currentRotation % (Math.PI * 2));
            
            canvas.style.transform = `rotate(${currentRotation}rad)`;

            setTimeout(() => {
                canSpin = true;
                spinBtn.disabled = false;
                winSound.play();
                
                const res = items[stopIndex];
                Swal.fire({
                    title: `<span style="color:${res.color}">${res.label}</span>`,
                    html: `<div class="animate__animated animate__bounceIn">
                           <p style="font-size: 1.5rem;">${res.type === 'rare' ? '🏆 UNBELIEVABLE! YOU WON!' : '💀 Oops! Adath Na!'}</p>
                           </div>`,
                    background: '#0a0a1a',
                    color: '#fff',
                    confirmButtonColor: '#00f2fe'
                });
            }, 7200);
        };

        window.addEventListener('keydown', (e) => { if (e.code === 'Space') { e.preventDefault(); startSpin(); } });
        spinBtn.addEventListener("click", startSpin);
        
        // පටන් ගන්න කොටම අඳින්න
        drawWheel();

    </script>
</body>
</html>
