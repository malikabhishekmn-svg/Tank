<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impossible Spin Wheel</title>
    <style>
        /* CSS styling මෙතන තියෙන්නේ */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #1a1a2e;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            text-align: center;
        }

        .wheel-wrapper {
            position: relative;
            margin-bottom: 30px;
            display: inline-block;
        }

        /* Wheel pointer එක (උඩ තියෙන ඊතලය) */
        .pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; 
            height: 0; 
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 40px solid #ff004c;
            z-index: 10;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5));
        }

        canvas {
            border-radius: 50%;
            box-shadow: 0 0 50px rgba(0,0,0,0.5), 0 0 10px rgba(255,255,255,0.1);
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
        }

        button {
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            background: linear-gradient(45deg, #ff004c, #ff6b00);
            color: white;
            border: none;
            border-radius: 50px;
            box-shadow: 0 5px 15px rgba(255, 0, 76, 0.4);
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(255, 0, 76, 0.6);
        }

        button:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
        }

        #result {
            margin-top: 20px;
            font-size: 1.8rem;
            min-height: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 style="margin-bottom: 40px;">Spin & Win!</h1>
        <div class="wheel-wrapper">
            <div class="pointer"></div>
            <canvas id="wheel" width="450" height="450"></canvas>
        </div>
        <br>
        <button id="spinBtn">SPIN NOW</button>
        <div id="result">Try your luck!</div>
    </div>

    <script>
        const canvas = document.getElementById("wheel");
        const ctx = canvas.getContext("2d");
        const spinBtn = document.getElementById("spinBtn");
        const resultText = document.getElementById("result");

        // මෙතන තමයි items තියෙන්නේ. 0 index එකේ තියෙන "iPhone 15" කවදාවත් එන්නේ නැහැ.
        const items = [
            { label: "iPhone 15", color: "#f1c40f" }, // Index 0 - RIGGED (Impossible)
            { label: "Try Again", color: "#34495e" },
            { label: "Free Spin", color: "#2980b9" },
            { label: "No Luck", color: "#c0392b" },
            { label: "Gift Box", color: "#27ae60" },
            { label: "Oops!", color: "#8e44ad" },
            { label: "Better Luck", color: "#d35400" },
            { label: "Spin Again", color: "#16a085" }
        ];

        const size = items.length;
        const arc = (2 * Math.PI) / size;
        let currentRotation = 0;

        // Wheel එක අඳින function එක
        function drawWheel() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            items.forEach((item, i) => {
                const angle = i * arc;
                
                // Segment එක අඳිනවා
                ctx.beginPath();
                ctx.fillStyle = item.color;
                ctx.moveTo(225, 225);
                ctx.arc(225, 225, 225, angle, angle + arc);
                ctx.lineTo(225, 225);
                ctx.fill();
                ctx.strokeStyle = "rgba(255,255,255,0.2)";
                ctx.stroke();

                // Text එක ලියනවා
                ctx.save();
                ctx.translate(225, 225);
                ctx.rotate(angle + arc / 2);
                ctx.fillStyle = "white";
                ctx.textAlign = "right";
                ctx.font = "bold 18px Arial";
                ctx.fillText(item.label, 200, 10);
                ctx.restore();
            });
        }

        spinBtn.addEventListener("click", () => {
            spinBtn.disabled = true;
            resultText.innerText = "Spinning...";
            resultText.style.color = "white";

            // RIGGED LOGIC: Index 0 තෝරන්නේ නැති වෙන්න බල කරනවා
            let stopIndex;
            do {
                stopIndex = Math.floor(Math.random() * size);
            } while (stopIndex === 0); // මෙතන 0 නම් ආපහු තෝරනවා

            // කැරකෙන ප්‍රමාණය ගණනය කිරීම (5 rotations + target offset)
            const extraDegree = (size - stopIndex) * arc - (arc / 2);
            const totalRotation = (Math.PI * 2 * 10) + extraDegree; 
            
            currentRotation += totalRotation;
            canvas.style.transform = `rotate(${currentRotation}rad)`;

            // කරකැවිලා ඉවර වුණාම result එක පෙන්නන්න
            setTimeout(() => {
                spinBtn.disabled = false;
                resultText.innerText = items[stopIndex].label;
                
                if(items[stopIndex].label === "iPhone 15") {
                    resultText.style.color = "#f1c40f"; // මේක කවදාවත් වෙන්නේ නැහැ
                }
            }, 5000);
        });

        drawWheel();
    </script>
</body>
</html>
