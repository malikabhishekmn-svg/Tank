<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tank Wars Ultra Pro</title>
    <style>
        :root { --p1-color: #2ecc71; --p2-color: #e67e22; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; touch-action: none; }
        
        #game-ui { display: flex; justify-content: space-around; padding: 10px; background: #1a1a1a; border-bottom: 2px solid #333; height: 50px; }
        .stat-box { font-size: 12px; font-weight: bold; text-transform: uppercase; }
        .hp-bar { width: 120px; height: 8px; background: #333; border-radius: 4px; overflow: hidden; margin-top: 4px; }
        .hp-fill { height: 100%; transition: width 0.3s; }
        .ammo { color: #f1c40f; font-size: 14px; }

        /* Big Map */
        #stage { 
            position: relative; width: 100vw; height: 70vh; 
            background-color: #222;
            background-image: radial-gradient(#333 1px, transparent 1px);
            background-size: 30px 30px;
            overflow: hidden; border-bottom: 4px solid #444; 
        }
        
        /* Advanced Tank */
        .tank { position: absolute; width: 50px; height: 50px; transition: transform 0.1s; }
        .tank-body { 
            width: 100%; height: 100%; border-radius: 8px; position: relative; 
            background: linear-gradient(45deg, #444, #666); border: 2px solid #222;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .turret { 
            position: absolute; width: 24px; height: 24px; background: inherit; 
            border: 2px solid #222; border-radius: 50%; left: 11px; top: 11px; z-index: 2;
        }
        .tank-barrel { 
            width: 8px; height: 28px; position: absolute; left: 8px; 
            background: #333; border-radius: 2px; transition: transform 0.1s;
        }
        
        #p1 .tank-body { background: var(--p1-color); }
        #p1 .tank-barrel { top: -22px; transform-origin: bottom; }
        #p2 .tank-body { background: var(--p2-color); }
        #p2 .tank-barrel { bottom: -22px; transform-origin: top; }

        .recoil { animation: recoilAnim 0.2s ease; }
        @keyframes recoilAnim { 0% { transform: translateY(0); } 50% { transform: translateY(10px); } 100% { transform: translateY(0); } }

        /* Environment */
        .wall { position: absolute; background: #555; border: 3px solid #333; border-radius: 4px; box-shadow: 5px 5px 10px rgba(0,0,0,0.3); }
        .bullet { position: absolute; width: 6px; height: 12px; border-radius: 3px; box-shadow: 0 0 15px yellow; z-index: 10; }
        .explosion { position: absolute; width: 80px; height: 80px; background: radial-gradient(circle, #fff, #f1c40f, #e67e22, transparent); border-radius: 50%; animation: boom 0.5s ease-out forwards; pointer-events: none; z-index: 20; }
        @keyframes boom { 0% { transform: scale(0.1); opacity: 1; } 100% { transform: scale(2.5); opacity: 0; } }

        /* Controls */
        #controls { display: grid; grid-template-columns: 1fr 1fr; height: 20vh; background: #111; padding: 5px; gap: 10px; }
        .ctrl-group { display: flex; align-items: center; justify-content: center; background: #1a1a1a; border-radius: 15px; border: 1px solid #333; }
        .btn { width: 65px; height: 65px; margin: 5px; background: #333; border: none; color: #fff; border-radius: 50%; font-size: 20px; font-weight: bold; }
        .btn:active { background: #555; transform: scale(0.9); }
        .fire { background: #c0392b !important; width: 80px; height: 80px; border: 4px solid #a93226; }
        .reload-text { position: absolute; width: 100%; text-align: center; color: red; font-weight: bold; top: 40%; display: none; font-size: 24px; text-shadow: 2px 2px #000; }
    </style>
</head>
<body>

    <div id="game-ui">
        <div class="stat-box">
            P1 (GREEN) <span class="ammo">Ammo: <span id="ammo1">10</span></span>
            <div class="hp-bar"><div id="hp1" class="hp-fill" style="width: 100%; background: var(--p1-color);"></div></div>
        </div>
        <div class="stat-box">
            P2 (ORANGE) <span class="ammo">Ammo: <span id="ammo2">10</span></span>
            <div class="hp-bar"><div id="hp2" class="hp-fill" style="width: 100%; background: var(--p2-color);"></div></div>
        </div>
    </div>

    <div id="stage">
        <div id="reload-msg" class="reload-text">RELOADING...</div>
        <div id="p1" class="tank" style="left: 100px; bottom: 30px;">
            <div class="tank-body"><div class="turret"><div class="tank-barrel"></div></div></div>
        </div>
        <div id="p2" class="tank" style="left: 100px; top: 30px;">
            <div class="tank-body"><div class="turret"><div class="tank-barrel"></div></div></div>
        </div>
    </div>

    <div id="controls">
        <div class="ctrl-group">
            <button class="btn" onpointerdown="move('p1',-20)">◀</button>
            <button class="btn fire" onpointerdown="shoot(1)">🔥</button>
            <button class="btn" onpointerdown="move('p1',20)">▶</button>
        </div>
        <div class="ctrl-group">
            <button class="btn" onpointerdown="move('p2',-20)">◀</button>
            <button class="btn fire" onpointerdown="shoot(2)">🔥</button>
            <button class="btn" onpointerdown="move('p2',20)">▶</button>
        </div>
    </div>

    <script>
        const stage = document.getElementById('stage');
        let hp1 = 100, hp2 = 100;
        let ammo1 = 10, ammo2 = 10;
        let isReloading1 = false, isReloading2 = false;
        let p1X = 100, p2X = 100;
        let bullets = [], walls = [];

        function createMap() {
            const wallData = [
                {x: 50, y: 150, w: 100, h: 20}, {x: 250, y: 150, w: 100, h: 20},
                {x: 150, y: 250, w: 150, h: 20}, {x: 50, y: 350, w: 100, h: 20}
            ];
            wallData.forEach(data => {
                const w = document.createElement('div');
                w.className = 'wall';
                w.style.left = data.x + 'px'; w.style.top = data.y + 'px';
                w.style.width = data.w + 'px'; w.style.height = data.h + 'px';
                stage.appendChild(w);
                walls.push({el: w, x: data.x, y: data.y, w: data.w, h: data.h});
            });
        }

        function move(p, val) {
            if(p === 'p1') {
                p1X = Math.max(10, Math.min(window.innerWidth-60, p1X + val));
                document.getElementById('p1').style.left = p1X + 'px';
            } else {
                p2X = Math.max(10, Math.min(window.innerWidth-60, p2X + val));
                document.getElementById('p2').style.left = p2X + 'px';
            }
        }

        function shoot(p) {
            if(p === 1 && (isReloading1 || ammo1 <= 0)) return;
            if(p === 2 && (isReloading2 || ammo2 <= 0)) return;

            const tankEl = document.getElementById('p' + p);
            tankEl.classList.add('recoil');
            setTimeout(() => tankEl.classList.remove('recoil'), 200);

            const b = document.createElement('div');
            b.className = 'bullet';
            let bx = (p === 1 ? p1X + 22 : p2X + 22);
            let by = (p === 1 ? stage.offsetHeight - 85 : 75);
            let bv = (p === 1 ? -10 : 10);
            
            b.style.left = bx + 'px'; b.style.top = by + 'px';
            b.style.background = (p === 1 ? 'var(--p1-color)' : 'var(--p2-color)');
            stage.appendChild(b);
            bullets.push({el: b, x: bx, y: by, v: bv, owner: p});

            if(p === 1) {
                ammo1--; document.getElementById('ammo1').innerText = ammo1;
                if(ammo1 === 0) reload(1);
            } else {
                ammo2--; document.getElementById('ammo2').innerText = ammo2;
                if(ammo2 === 0) reload(2);
            }
        }

        function reload(p) {
            document.getElementById('reload-msg').style.display = 'block';
            if(p === 1) isReloading1 = true; else isReloading2 = true;
            setTimeout(() => {
                if(p === 1) { ammo1 = 10; isReloading1 = false; document.getElementById('ammo1').innerText = 10; }
                else { ammo2 = 10; isReloading2 = false; document.getElementById('ammo2').innerText = 10; }
                if(!isReloading1 && !isReloading2) document.getElementById('reload-msg').style.display = 'none';
            }, 2000);
        }

        function explode(x, y) {
            const ex = document.createElement('div');
            ex.className = 'explosion';
            ex.style.left = (x - 40) + 'px'; ex.style.top = (y - 40) + 'px';
            stage.appendChild(ex);
            setTimeout(() => ex.remove(), 500);
        }

        function gameLoop() {
            bullets.forEach((b, i) => {
                b.y += b.v;
                b.el.style.top = b.y + 'px';

                walls.forEach(w => {
                    if(b.x > w.x && b.x < w.x+w.w && b.y > w.y && b.y < w.y+w.h) {
                        explode(b.x, b.y); b.el.remove(); bullets.splice(i, 1);
                    }
                });

                if(b.owner === 2 && b.y > stage.offsetHeight - 80 && b.x > p1X && b.x < p1X + 50) {
                    hp1 -= 10; document.getElementById('hp1').style.width = hp1 + '%';
                    explode(b.x, b.y); b.el.remove(); bullets.splice(i, 1);
                } else if(b.owner === 1 && b.y < 80 && b.x > p2X && b.x < p2X + 50) {
                    hp2 -= 10; document.getElementById('hp2').style.width = hp2 + '%';
                    explode(b.x, b.y); b.el.remove(); bullets.splice(i, 1);
                }

                if(b.y < 0 || b.y > stage.offsetHeight) { b.el.remove(); bullets.splice(i, 1); }
            });

            if(hp1 <= 0 || hp2 <= 0) {
                alert(hp1 <= 0 ? "ORANGE TANK WINS!" : "GREEN TANK WINS!");
                location.reload();
            }
            requestAnimationFrame(gameLoop);
        }

        window.onkeydown = (e) => {
            if(e.key === 'a') move('p1', -20); if(e.key === 'd') move('p1', 20); if(e.key === ' ') shoot(1);
            if(e.key === 'ArrowLeft') move('p2', -20); if(e.key === 'ArrowRight') move('p2', 20); if(e.key === 'Enter') shoot(2);
        };

        createMap();
        gameLoop();
    </script>
</body>
                </html>
